name: Auto Release APK

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Android Debug Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-${{ runner.os }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (GitHub Flavor)
        run: flutter build apk --flavor github

      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            **Smart Search Page Update! 🚀**
            
            - **Google-style History:** Search history now appears dynamically when you tap the search bar, without blocking the whole screen!
            - **Mood Chips:** Added 8 instant search chips right under the bar (`🎧 Workout`, `💔 Sad`, `🚗 Drive`, etc.).
            - **Smart Algorithm:** App now prioritizes your frequent searches and most-listened songs.
            - **Time-based Magic:** Suggests different music for Morning, Afternoon, Evening, and Night automatically!
          files: build/app/outputs/flutter-apk/app-github-release.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
